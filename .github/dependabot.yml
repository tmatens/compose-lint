version: 2
updates:
  # Keep GitHub Actions pinned versions current — covers ci.yml, publish.yml,
  # codeql.yml, scorecard.yml, and the composite action.yml at repo root.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Python dependencies live in pyproject.toml. PyYAML is the only runtime
  # dep; the rest are dev tools (ruff, mypy, pytest, types-pyyaml).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Runtime image — digest-pinned per AGENTS.md policy. Keeps the
  # python:3.13-alpine base current so Alpine security fixes (musl,
  # openssl, etc.) flow in as upstream rebuilds.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  # ClusterFuzzLite build image — digest-pinned per AGENTS.md policy.
  - package-ecosystem: docker
    directory: "/.clusterfuzzlite"
    schedule:
      interval: weekly
