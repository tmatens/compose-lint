name: ClusterFuzzLite batch fuzzing

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  batch-fuzzing:
    permissions:
      contents: read
      actions: write
      security-events: write
      issues: write
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          sanitizer: ${{ matrix.sanitizer }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          sanitizer: ${{ matrix.sanitizer }}
          fuzz-seconds: 600
          mode: batch
          output-sarif: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report scheduled failure as issue
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ github.workflow }}
          SANITIZER: ${{ matrix.sanitizer }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Scheduled run failed: ${WORKFLOW} (${SANITIZER})"
          body=$(printf -- '- Workflow: **%s**\n- Matrix leg: **%s**\n- Run: %s\n- Commit: %s\n\nReopen or close when triaged.' \
            "${WORKFLOW}" "${SANITIZER}" "${RUN_URL}" "${GITHUB_SHA}")
          existing=$(gh issue list --state open --search "\"${title}\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
