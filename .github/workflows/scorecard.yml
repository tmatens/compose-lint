name: OpenSSF Scorecard

on:
  # Scorecard measures repo-level posture (branch protection, signing,
  # workflow permissions, pinned deps) that is essentially static from one
  # commit to the next, so a per-push run adds nothing over the weekly
  # `schedule` and the `branch_protection_rule` trigger that fires when the
  # posture actually changes. `publish_results` still works from the weekly
  # schedule run on the default branch, so the public badge keeps updating.
  branch_protection_rule:
  schedule:
    - cron: "13 5 * * 1"

permissions: {}

jobs:
  # Scorecard's webapp verification rejects a SARIF publish if the analysis
  # job contains any non-`uses:` steps (see ossf/scorecard-action workflow
  # restrictions). The auto-issue step lives in a downstream job instead.
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif

  report-failure:
    needs: analysis
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    permissions:
      issues: write
    steps:
      - name: Open or update scheduled-failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Scheduled run failed: ${WORKFLOW}"
          body=$(printf -- '- Workflow: **%s**\n- Run: %s\n- Commit: %s\n\nReopen or close when triaged.' \
            "${WORKFLOW}" "${RUN_URL}" "${GITHUB_SHA}")
          existing=$(gh issue list --state open --search "\"${title}\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
