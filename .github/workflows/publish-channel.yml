name: Publish channel (manual)

# Emergency escape hatch — use when one channel's smoke is broken and you
# need to ship the other independently. Normal releases go through publish.yml.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.2.3)"
        required: true
      channel:
        description: "Channel"
        required: true
        type: choice
        options:
          - pypi
          - docker

permissions:
  contents: read

jobs:
  publish-pypi:
    if: inputs.channel == 'pypi'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/compose-lint
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so we can verify the tag is annotated and
          # reachable from main before shipping.
          fetch-depth: 0
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - name: Verify tag is annotated and reachable from main
        env:
          TAG: ${{ inputs.tag }}
        run: |
          obj_type=$(git cat-file -t "${TAG}")
          if [ "${obj_type}" != "tag" ]; then
            echo "::error::${TAG} is a ${obj_type}, expected an annotated tag"
            exit 1
          fi
          tag_commit=$(git rev-parse "${TAG}^{commit}")
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "::error::${TAG} commit ${tag_commit} is not reachable from origin/main"
            exit 1
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install pinned build env
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-deps -e .
      - run: python -m build
      - name: Verify dist contents
        run: |
          twine check dist/*
          if unzip -l dist/*.whl | grep -E '(AGENTS\.md|CLAUDE\.md|\.env|/tests/|\.git/)'; then
            echo "::error::Wheel contains forbidden files"
            exit 1
          fi
      # Pre-publish smoke against the locally-built wheel. publish.yml runs
      # the same check via TestPyPI before its `release-gate`; this emergency
      # path previously had no smoke at all, so a bad wheel could ship
      # straight to PyPI on a single approval. Install the wheel into a
      # throwaway venv so the `compose-lint` on PATH is the one we're about
      # to publish (not the editable install used by `python -m build`).
      - name: Smoke the built wheel
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl
          cat > /tmp/clean.yml <<'YAML'
          services:
            web:
              image: nginx:1.27-alpine
              ports:
                - "127.0.0.1:8080:80"
              security_opt:
                - no-new-privileges:true
              cap_drop:
                - ALL
              read_only: true
              tmpfs:
                - /tmp
                - /run
          YAML
          cat > /tmp/insecure.yml <<'YAML'
          services:
            app:
              image: myapp:1.0
              privileged: true
          YAML
          /tmp/smoke-venv/bin/compose-lint /tmp/clean.yml
          exit_code=0
          /tmp/smoke-venv/bin/compose-lint /tmp/insecure.yml || exit_code=$?
          if [ "${exit_code}" -ne 1 ]; then
            echo "::error::Expected exit 1 on insecure fixture, got ${exit_code}"
            exit 1
          fi
      # SBOM parity with publish.yml's build job. Emergency pypi publishes
      # should leave the same SPDX artifact on the Release as the normal
      # path. Attach (or replace) it with --clobber so re-running this
      # workflow against a tag whose Release already has an SBOM is idempotent.
      - name: Generate SPDX SBOM for dists
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist/
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
      - name: Attach SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: gh release upload "${TAG}" sbom.spdx.json --clobber

  # Pre-publish smoke for the docker channel. publish.yml runs docker-smoke
  # multi-arch before the release-gate; this emergency path has no shared
  # gate, so a broken Dockerfile or runtime dep could push straight to Docker
  # Hub on a single approval. Single-arch (amd64) keeps the smoke cheap —
  # multi-arch is still covered by the real build-docker matrix below.
  docker-smoke:
    if: inputs.channel == 'docker'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - name: Verify tag is annotated and reachable from main
        env:
          TAG: ${{ inputs.tag }}
        run: |
          obj_type=$(git cat-file -t "${TAG}")
          if [ "${obj_type}" != "tag" ]; then
            echo "::error::${TAG} is a ${obj_type}, expected an annotated tag"
            exit 1
          fi
          tag_commit=$(git rev-parse "${TAG}^{commit}")
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "::error::${TAG} commit ${tag_commit} is not reachable from origin/main"
            exit 1
          fi
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build image for testing
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: composelint/compose-lint:channel-smoke
      - name: Test — version output matches tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          expected="compose-lint ${TAG#v}"
          actual="$(docker run --rm composelint/compose-lint:channel-smoke --version)"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Version mismatch: '${actual}' vs expected '${expected}'"
            exit 1
          fi
      - name: Test — clean fixture exits 0
        run: |
          cat > /tmp/clean.yml <<'YAML'
          services:
            web:
              image: nginx:1.27-alpine
              ports:
                - "127.0.0.1:8080:80"
              security_opt:
                - no-new-privileges:true
              cap_drop:
                - ALL
              read_only: true
              tmpfs:
                - /tmp
                - /run
          YAML
          docker run --rm -v /tmp/clean.yml:/src/docker-compose.yml \
            composelint/compose-lint:channel-smoke
      - name: Test — insecure fixture exits 1
        run: |
          cat > /tmp/insecure.yml <<'YAML'
          services:
            app:
              image: myapp:1.0
              privileged: true
          YAML
          exit_code=0
          docker run --rm -v /tmp/insecure.yml:/src/docker-compose.yml \
            composelint/compose-lint:channel-smoke || exit_code=$?
          if [ "${exit_code}" -ne 1 ]; then
            echo "::error::Expected exit 1 on insecure fixture, got ${exit_code}"
            exit 1
          fi

  # Build one image per arch on a native runner (no QEMU) and push by
  # digest only. See the matching block in publish.yml for the full
  # rationale — the emulated arm64 apt-get path is unreliable.
  build-docker:
    if: inputs.channel == 'docker'
    needs: docker-smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Derive artifact slug from platform
        id: slug
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=composelint/compose-lint,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-docker:
    if: inputs.channel == 'docker'
    needs: build-docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: dockerhub
      url: https://hub.docker.com/r/composelint/compose-lint
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # workflow_dispatch sets GITHUB_REF to the dispatched branch, so
      # docker/metadata-action's semver patterns can't derive tags from the
      # release tag on their own. Compute them explicitly from inputs.tag
      # to mirror publish.yml's output shape (version, major.minor, and
      # major for v1+).
      - name: Compute tags
        id: meta
        env:
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#v}"
          major_minor="${version%.*}"
          major="${major_minor%.*}"
          tags="composelint/compose-lint:${version}"
          tags="${tags},composelint/compose-lint:${major_minor}"
          if [[ ! "${version}" =~ ^0\. ]]; then
            tags="${tags},composelint/compose-lint:${major}"
          fi
          {
            echo "tags=${tags}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"
      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          IFS=',' read -ra TAG_ARGS <<< "${TAGS}"
          tag_flags=()
          for t in "${TAG_ARGS[@]}"; do
            tag_flags+=(-t "$t")
          done
          digest_refs=()
          for f in *; do
            digest_refs+=("composelint/compose-lint@sha256:${f}")
          done
          docker buildx imagetools create "${tag_flags[@]}" "${digest_refs[@]}"
      - name: Inspect manifest digest
        id: inspect
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          digest="$(docker buildx imagetools inspect \
            "composelint/compose-lint:${VERSION}" \
            --format '{{json .Manifest}}' | jq -r '.digest')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Sign manifest with cosign
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: cosign sign --yes "composelint/compose-lint@${DIGEST}"
      - name: Verify — cosign signature
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          for attempt in 1 2 3; do
            if cosign verify \
              --certificate-identity-regexp="github\.com/tmatens/compose-lint" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              "composelint/compose-lint@${DIGEST}"; then
              exit 0
            fi
            echo "Attempt ${attempt} failed, waiting 15s..."
            sleep 15
          done
          echo "::error::cosign verify failed after 3 attempts"
          exit 1
      - name: Verify — published image version matches tag
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
          TAG: ${{ inputs.tag }}
        run: |
          expected="compose-lint ${TAG#v}"
          actual="$(docker run --rm "composelint/compose-lint@${DIGEST}" --version)"
          echo "Expected: ${expected}"
          echo "Actual:   ${actual}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Published image version mismatch: '${actual}' vs tag '${expected}'"
            exit 1
          fi
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: composelint/compose-lint@${{ steps.inspect.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Attest SBOM to image
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json \
            "composelint/compose-lint@${DIGEST}"
