name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR when new commits land.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deny-all at the workflow level; every job declares the scopes it needs.
permissions: {}

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            requirements-build.lock
      - name: Install pinned dev env
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-deps -e .
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            requirements-build.lock
      - name: Install pinned dev env
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-deps -e .
      - run: mypy src/

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            requirements-build.lock
      - name: Install pinned dev env
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-deps -e .
      - run: pytest

  security:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            requirements-build.lock
      - name: Install scan tools
        # Upgrade pip first so pip-audit doesn't flag CVEs in the
        # runner-bundled pip itself (those are out of scope for this
        # project's supply chain). The pip upgrade is deliberately
        # unpinned per the "always-latest for the bootstrap" exception
        # in AGENTS.md "Dependency pinning". bandit and pip-audit come
        # from the hash-pinned dev lockfile.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-deps -e .
      - name: Bandit (source SAST)
        run: bandit -r src/ -ll
      - name: pip-audit (dependency CVEs)
        # --skip-editable skips compose-lint itself (it isn't on PyPI
        # for the local install path); PyYAML and any future runtime
        # deps are still scanned.
        run: pip-audit --skip-editable

  # Fails the PR if `pyproject.toml` and `src/compose_lint/__init__.py`
  # disagree about the project version. The two strings drifted silently
  # before 0.2.0 and are the single most-called-out release hazard in
  # docs/RELEASING.md. This guard catches the drift at review time rather
  # than at tag-push time (where the tag would already be minted against a
  # wrong source of truth).
  version-consistency:
    name: Version strings in sync
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Compare pyproject.toml and __init__.py
        run: |
          pyproject=$(grep -E '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          init=$(grep '__version__' src/compose_lint/__init__.py | head -1 | cut -d'"' -f2)
          echo "pyproject.toml: ${pyproject}"
          echo "__init__.py:    ${init}"
          if [ -z "${pyproject}" ] || [ -z "${init}" ]; then
            echo "::error::Could not extract version from one or both files"
            exit 1
          fi
          if [ "${pyproject}" != "${init}" ]; then
            echo "::error::Version drift: pyproject.toml (${pyproject}) vs src/compose_lint/__init__.py (${init})"
            exit 1
          fi

  # If a PR bumps the `version` in pyproject.toml, CHANGELOG.md must already
  # contain a matching `## [X.Y.Z]` section. Without this, a release PR can
  # merge with no release notes and the Publish workflow's `create-release`
  # job fails *after* the tag has been minted — burning a PyPI version
  # number on a broken release.
  changelog-gate:
    name: CHANGELOG entry for version bumps
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require matching CHANGELOG section if version changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if ! git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -q '^pyproject.toml$'; then
            echo "pyproject.toml not touched; no version bump to gate."
            exit 0
          fi
          base_version=$(git show "${BASE_SHA}:pyproject.toml" | grep -E '^version = ' | head -1 | cut -d'"' -f2)
          head_version=$(git show "${HEAD_SHA}:pyproject.toml" | grep -E '^version = ' | head -1 | cut -d'"' -f2)
          if [ "${base_version}" = "${head_version}" ]; then
            echo "pyproject.toml changed but version line did not; not a release bump."
            exit 0
          fi
          echo "Version bump detected: ${base_version} -> ${head_version}"
          if ! grep -qE "^## \[${head_version}\]" CHANGELOG.md; then
            echo "::error::pyproject.toml bumped to ${head_version} but CHANGELOG.md has no '## [${head_version}]' section"
            exit 1
          fi
          echo "Found matching CHANGELOG section for ${head_version}."

  # Surfaces new dependencies introduced by a PR that carry known CVEs
  # or incompatible licenses — before pip-audit would catch them post-merge
  # against the dev lockfile. Run only on pull_request; the action requires
  # a base ref to diff against.
  dependency-review:
    name: Dependency review (PR deps)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Lints every workflow under .github/workflows/. Catches shell-quoting
  # bugs (via embedded shellcheck), unsafe ${{ }} interpolation in run:
  # blocks, unknown expressions, matrix-config typos, etc. actionlint is
  # installed from its GitHub Release tarball with SHA256 verification so
  # there's no curl-pipe-bash and no third-party composite action to pin.
  # Renovate's github-releases datasource handles version bumps.
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o actionlint.tar.gz "${url}"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          rm actionlint.tar.gz
      - run: ./actionlint -color

  # Fails the PR if any FROM in the Dockerfile pins a per-arch manifest
  # instead of a multi-arch OCI index. Multi-arch regressions otherwise
  # don't surface until docker-publish at release time.
  dockerfile-digests:
    name: Verify Dockerfile digests are manifest lists
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: scripts/verify-dockerfile-digests.sh Dockerfile

  # Builds the Dockerfile on PRs that touch build inputs and runs the
  # image against fixtures. Without this, a broken Dockerfile or runtime
  # dependency change silently rides to tag time where the release
  # `docker-smoke` job is the first thing to notice. amd64-only to keep
  # the gate cheap; the release pipeline covers multi-arch.
  docker-smoke:
    name: Smoke test Dockerfile (amd64)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Determine if Docker-relevant files changed
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" \
              | grep -qE '^(Dockerfile|\.dockerignore|requirements\.lock|requirements-build\.lock|pyproject\.toml|src/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No Docker-relevant files changed — skipping build."
          fi
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        if: steps.changes.outputs.run == 'true'
      - name: Build image
        if: steps.changes.outputs.run == 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: composelint/compose-lint:pr-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Clean fixture exits 0
        if: steps.changes.outputs.run == 'true'
        run: |
          cat > /tmp/clean.yml <<'YAML'
          services:
            web:
              image: nginx:1.27-alpine
              ports:
                - "127.0.0.1:8080:80"
              security_opt:
                - no-new-privileges:true
              cap_drop:
                - ALL
              read_only: true
          YAML
          docker run --rm -v /tmp/clean.yml:/src/docker-compose.yml composelint/compose-lint:pr-smoke
      - name: Insecure fixture exits 1
        if: steps.changes.outputs.run == 'true'
        run: |
          cat > /tmp/insecure.yml <<'YAML'
          services:
            app:
              image: myapp:1.0
              privileged: true
          YAML
          exit_code=0
          docker run --rm -v /tmp/insecure.yml:/src/docker-compose.yml composelint/compose-lint:pr-smoke || exit_code=$?
          if [ "${exit_code}" -ne 1 ]; then
            echo "::error::Expected exit code 1, got ${exit_code}"
            exit 1
          fi
      - name: SARIF output is valid JSON
        if: steps.changes.outputs.run == 'true'
        run: |
          cat > /tmp/test.yml <<'YAML'
          services:
            db:
              image: postgres:16
          YAML
          docker run --rm -v /tmp/test.yml:/src/docker-compose.yml composelint/compose-lint:pr-smoke --format sarif --fail-on critical \
            | python3 -c "import sys, json; json.load(sys.stdin); print('Valid SARIF JSON')"

  action-smoke:
    name: Smoke test action.yml
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Smoke fixtures live in tests/smoke/ and are shared with every
      # other workflow that runs compose-lint end-to-end (publish.yml
      # testpypi-smoke, publish.yml docker-smoke, marketplace-smoke.yml).
      # One source of truth prevents per-workflow drift.

      # No `version:` pin — the action defaults to installing the latest
      # release from PyPI. What this job tests is the action.yml contract
      # (inputs, file discovery, SARIF wiring) against whatever compose-lint
      # is currently published. Pinning to a stale version hid breakages
      # between the source action and the published package through 0.3.x.
      - name: Clean fixture should pass
        uses: ./
        with:
          files: tests/smoke/clean.yml
          fail-on: high

      - name: Insecure fixture should fail
        id: insecure
        continue-on-error: true
        uses: ./
        with:
          files: tests/smoke/insecure.yml
          fail-on: high

      - name: Assert insecure run failed
        if: steps.insecure.outcome != 'failure'
        run: |
          echo "::error::Expected action to fail on insecure fixture, got '${{ steps.insecure.outcome }}'"
          exit 1
