name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR when new commits land.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only — individual jobs can request more if they need it.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.10
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest

  security:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install scan tools
        # Upgrade pip first so pip-audit doesn't flag CVEs in the
        # runner-bundled pip itself (those are out of scope for this
        # project's supply chain). The pip upgrade is deliberately
        # unpinned per the "always-latest for the bootstrap" exception
        # noted above; bandit and pip-audit are pinned to exact
        # versions per AGENTS.md "Dependency pinning → CI tool installs".
        run: |
          python -m pip install --upgrade pip
          pip install -e . bandit==1.9.4 pip-audit==2.10.0
      - name: Bandit (source SAST)
        run: bandit -r src/ -ll
      - name: pip-audit (dependency CVEs)
        # --skip-editable skips compose-lint itself (it isn't on PyPI
        # for the local install path); PyYAML and any future runtime
        # deps are still scanned.
        run: pip-audit --skip-editable

  action-smoke:
    name: Smoke test action.yml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Fixtures are written inline so the smoke test is self-contained
      # and doesn't couple to tests/compose_files/ (which may evolve as
      # rules change). The action installs compose-lint from PyPI, so
      # behavior here is pinned to the released version below, not the
      # current source tree.
      - name: Create smoke fixtures
        run: |
          mkdir -p smoke
          cat > smoke/clean.yml <<'YAML'
          services:
            web:
              image: nginx:1.27-alpine
              ports:
                - "127.0.0.1:8080:80"
              security_opt:
                - no-new-privileges:true
              cap_drop:
                - ALL
              read_only: true
              tmpfs:
                - /tmp
                - /run
          YAML
          cat > smoke/insecure.yml <<'YAML'
          services:
            app:
              image: myapp:1.0
              privileged: true
          YAML

      - name: Clean fixture should pass
        uses: ./
        with:
          files: smoke/clean.yml
          fail-on: high
          version: "0.2.0"

      - name: Insecure fixture should fail
        id: insecure
        continue-on-error: true
        uses: ./
        with:
          files: smoke/insecure.yml
          fail-on: high
          version: "0.2.0"

      - name: Assert insecure run failed
        if: steps.insecure.outcome != 'failure'
        run: |
          echo "::error::Expected action to fail on insecure fixture, got '${{ steps.insecure.outcome }}'"
          exit 1
