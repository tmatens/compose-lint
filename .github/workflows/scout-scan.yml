name: Docker Scout (scheduled)

on:
  workflow_dispatch:
  schedule:
    # Daily; catches new advisories against the published image.
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      actions: read
      issues: write
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan published image (Docker Scout)
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1.20.4
        with:
          command: cves
          image: composelint/compose-lint:latest
          only-severities: critical,high
          exit-code: false
          sarif-file: scout-results.sarif

      - name: Upload Scout results to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: scout-results.sarif
          category: docker-scout-scheduled

      - name: Report scheduled failure as issue
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Scheduled run failed: ${WORKFLOW}"
          body=$(printf -- '- Workflow: **%s**\n- Run: %s\n- Commit: %s\n\nReopen or close when triaged.' \
            "${WORKFLOW}" "${RUN_URL}" "${GITHUB_SHA}")
          existing=$(gh issue list --state open --search "\"${title}\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
