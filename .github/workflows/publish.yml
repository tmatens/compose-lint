name: Publish

on:
  push:
    tags:
      - "v*"

# Default to read-only — individual jobs request what they need.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install pinned build env
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-deps -e .
      - run: python -m build
      - name: Verify dist contents
        run: |
          twine check dist/*
          # Wheel must NOT contain agent config, .env, tests, or .git.
          if unzip -l dist/*.whl | grep -E '(AGENTS\.md|CLAUDE\.md|\.env|/tests/|\.git/)'; then
            echo "::error::Wheel contains forbidden files"
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/compose-lint
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  testpypi-smoke:
    needs: testpypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for TestPyPI index to update
        run: sleep 30
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install from TestPyPI and verify version
        run: |
          version="${GITHUB_REF_NAME#v}"
          pip install \
            -i https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "compose-lint==${version}"
          expected="compose-lint ${version}"
          actual="$(compose-lint --version)"
          echo "Expected: ${expected}"
          echo "Actual:   ${actual}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::TestPyPI version mismatch: installed '${actual}', expected '${expected}'"
            exit 1
          fi
      - name: Smoke test — lint a clean fixture
        run: |
          cat > /tmp/clean.yml <<'YAML'
          services:
            web:
              image: nginx:1.27-alpine
              ports:
                - "127.0.0.1:8080:80"
              security_opt:
                - no-new-privileges:true
              cap_drop:
                - ALL
              read_only: true
          YAML
          compose-lint /tmp/clean.yml
      - name: Smoke test — insecure fixture exits 1
        run: |
          cat > /tmp/insecure.yml <<'YAML'
          services:
            app:
              image: myapp:1.0
              privileged: true
          YAML
          exit_code=0
          compose-lint /tmp/insecure.yml || exit_code=$?
          if [ "${exit_code}" -ne 1 ]; then
            echo "::error::Expected exit code 1, got ${exit_code}"
            exit 1
          fi

  # Build the image natively on each target arch and run the fixture battery.
  # Emulated arm64 via QEMU crashes on Debian apt-get, and a single-arch smoke
  # can't catch per-arch digest pins or native-wheel mismatches before the
  # release-gate — so both legs are exercised here, on their own runners, no
  # QEMU. Scout CVE scanning stays single-arch (amd64): CVE findings come from
  # base-image layers that are identical across arch in practice, and running
  # Scout twice would double-upload SARIF under the same category.
  docker-smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            scout: true
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            scout: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build image for testing
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: composelint/compose-lint:test
      - name: Test — version output matches tag
        run: |
          expected="compose-lint ${GITHUB_REF_NAME#v}"
          actual="$(docker run --rm composelint/compose-lint:test --version)"
          echo "Expected: ${expected}"
          echo "Actual:   ${actual}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Version mismatch: image reports '${actual}', expected '${expected}'"
            exit 1
          fi
      - name: Test — clean fixture exits 0
        run: |
          cat > /tmp/clean.yml <<'YAML'
          services:
            web:
              image: nginx:1.27-alpine
              ports:
                - "127.0.0.1:8080:80"
              security_opt:
                - no-new-privileges:true
              cap_drop:
                - ALL
              read_only: true
          YAML
          docker run --rm -v /tmp/clean.yml:/src/docker-compose.yml composelint/compose-lint:test
      - name: Test — insecure fixture exits 1
        run: |
          cat > /tmp/insecure.yml <<'YAML'
          services:
            app:
              image: myapp:1.0
              privileged: true
          YAML
          exit_code=0
          docker run --rm -v /tmp/insecure.yml:/src/docker-compose.yml composelint/compose-lint:test || exit_code=$?
          if [ "${exit_code}" -ne 1 ]; then
            echo "::error::Expected exit code 1, got ${exit_code}"
            exit 1
          fi
      - name: Test — SARIF output is valid JSON
        run: |
          cat > /tmp/test.yml <<'YAML'
          services:
            db:
              image: postgres:16
          YAML
          docker run --rm -v /tmp/test.yml:/src/docker-compose.yml composelint/compose-lint:test --format sarif --fail-on critical | python3 -c "import sys,json; json.load(sys.stdin); print('Valid SARIF JSON')"
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: matrix.scout
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Scan for vulnerabilities (Docker Scout)
        if: matrix.scout
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1.20.4
        with:
          command: cves
          image: local://composelint/compose-lint:test
          only-severities: critical
          exit-code: true
          sarif-file: scout-results.sarif
      - name: Upload Scout results to GitHub Security
        if: matrix.scout && always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: scout-results.sarif
          category: docker-scout

  # Single approval gate — all smoke tests (PyPI + Docker) must pass first.
  # Configure the 'release' GitHub Environment with required reviewers.
  release-gate:
    needs: [testpypi-smoke, docker-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: release
    steps:
      - run: echo "All smoke tests passed. Proceeding with production publish."

  publish:
    needs: release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/compose-lint
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  # Build one image per architecture on a native runner and push it to the
  # registry by digest only (no tags). Emulated arm64 via QEMU crashes on
  # Debian apt-get (exit 255 from the QEMU emulator itself), so each arch
  # builds on its own native runner. A subsequent job stitches the
  # per-arch digests into a multi-arch manifest list.
  docker-build:
    needs: release-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Derive artifact slug from platform
        id: slug
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=composelint/compose-lint,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-publish:
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    environment:
      name: dockerhub
      url: https://hub.docker.com/r/composelint/compose-lint
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: composelint/compose-lint
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'composelint/compose-lint@sha256:%s ' *)
      - name: Inspect manifest digest
        id: inspect
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          digest="$(docker buildx imagetools inspect \
            "composelint/compose-lint:${VERSION}" \
            --format '{{json .Manifest}}' | jq -r '.digest')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Sign manifest with cosign
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: cosign sign --yes "composelint/compose-lint@${DIGEST}"
      - name: Verify — cosign signature
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          for attempt in 1 2 3; do
            if cosign verify \
              --certificate-identity-regexp="github\.com/tmatens/compose-lint" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              "composelint/compose-lint@${DIGEST}"; then
              exit 0
            fi
            echo "Attempt ${attempt} failed, waiting 15s for signature propagation..."
            sleep 15
          done
          echo "::error::cosign verify failed after 3 attempts"
          exit 1
      - name: Verify — published image version matches tag
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          expected="compose-lint ${GITHUB_REF_NAME#v}"
          actual="$(docker run --rm "composelint/compose-lint@${DIGEST}" --version)"
          echo "Expected: ${expected}"
          echo "Actual:   ${actual}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Published image version mismatch: '${actual}' vs tag '${expected}'"
            exit 1
          fi
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: composelint/compose-lint@${{ steps.inspect.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Attest SBOM to image
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json \
            "composelint/compose-lint@${DIGEST}"

  # Create the GitHub Release only after both production channels
  # (PyPI + Docker Hub) have published successfully. `needs:` gating
  # means a failure in either channel skips this job, so we never
  # advertise a half-published version. Release notes come from the
  # matching `## [X.Y.Z]` section in CHANGELOG.md. Creating the
  # Release also updates the Marketplace listing for the action.
  create-release:
    needs: [publish, docker-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Extract changelog section for this tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          awk -v v="${version}" '
            $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::error::No CHANGELOG section found for ${version}"
            exit 1
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file notes.md \
            --verify-tag
