name: Publish

on:
  push:
    tags:
      - "v*"

# Deny-all at the workflow level; every job declares the scopes it needs.
permissions: {}

# Serialize runs that share a tag so two overlapping pushes of the same
# ref can't race past `release-gate` and double-publish. Different tags
# still publish in parallel. Never `cancel-in-progress: true` here —
# canceling a publish mid-run can leave PyPI accepting the wheel while
# the GitHub Release is never minted, or Docker tags pushed without
# cosign signatures, etc.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate every publish path on two lightweight tag checks:
  #   1. The ref is an annotated tag (not a lightweight tag). Release tags
  #      are created with `git tag -s`, which is always annotated; a
  #      lightweight tag here means something/someone pushed a malformed
  #      release tag.
  #   2. The tag commit is reachable from origin/main. Without this, a
  #      rogue tag pointed at an arbitrary commit (outside main's merge
  #      history) would still trigger publish.yml and ship whatever tree
  #      that commit has.
  #
  # Full SSH-signature verification would require committing the
  # maintainer's allowed-signers file; that's a follow-up.
  verify-tag:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Assert annotated tag and reachable from main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          obj_type=$(git cat-file -t "${TAG}")
          if [ "${obj_type}" != "tag" ]; then
            echo "::error::${TAG} is a ${obj_type}, expected an annotated tag (git tag -s/-a)"
            exit 1
          fi
          tag_commit=$(git rev-parse "${TAG}^{commit}")
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "::error::${TAG} commit ${tag_commit} is not reachable from origin/main"
            exit 1
          fi
          echo "Tag ${TAG} is annotated and reachable from origin/main (commit ${tag_commit})."

  build:
    needs: verify-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            requirements-build.lock
      - name: Install pinned build env
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-deps -e .
      - run: python -m build
      - name: Verify dist contents
        run: |
          twine check dist/*
          # Wheel must NOT contain agent config, .env, tests, or .git.
          if unzip -l dist/*.whl | grep -E '(AGENTS\.md|CLAUDE\.md|\.env|/tests/|\.git/)'; then
            echo "::error::Wheel contains forbidden files"
            exit 1
          fi
      # Sign dists with Sigstore so we can attach .sigstore bundles to the
      # GitHub Release. PyPI gets its own PEP 740 attestations via the
      # trusted-publisher flow in the `publish` job — this is an independent
      # signing path whose artifacts are visible on the Release page (which
      # is what OpenSSF Scorecard's Signed-Releases check inspects).
      - uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Separate sigstore bundles from dist
        # pypa/gh-action-pypi-publish expects dist/ to contain only wheels
        # and sdists; move bundles out before the dist artifact is uploaded.
        # sigstore-python has written both `.sigstore` and `.sigstore.json`
        # depending on version — handle both.
        run: |
          mkdir -p signatures
          shopt -s nullglob
          for f in dist/*.sigstore dist/*.sigstore.json; do
            mv "$f" signatures/
          done
          ls signatures/
      - name: Verify every dist has a matching signature
        # Pre-flight gate: catches a silent signing regression (e.g. the
        # sigstore action changes output extension again) here, in `build`,
        # before anything publishes to PyPI or Docker Hub. Without this, a
        # signing regression would only surface at `create-release` — after
        # PyPI has already immutably accepted the version, leaving a
        # half-published state that requires manual recovery.
        run: |
          shopt -s nullglob
          dists=(dist/*.whl dist/*.tar.gz)
          sigs=(signatures/*)
          if [ "${#dists[@]}" -eq 0 ]; then
            echo "::error::No distributions found in dist/"
            exit 1
          fi
          if [ "${#sigs[@]}" -ne "${#dists[@]}" ]; then
            echo "::error::Signature count (${#sigs[@]}) does not match dist count (${#dists[@]})"
            echo "dists: ${dists[*]}"
            echo "sigs:  ${sigs[*]}"
            exit 1
          fi
          for d in "${dists[@]}"; do
            base="$(basename "$d")"
            if ! ls "signatures/${base}".sigstore* >/dev/null 2>&1; then
              echo "::error::No signature found for ${base}"
              exit 1
            fi
          done
          echo "All ${#dists[@]} distributions have matching signatures."
      # Generate an SPDX SBOM covering everything in dist/ (wheel + sdist).
      # docker-publish already attests an SBOM to the image; this closes
      # the PyPI gap so every shipped channel has a machine-readable bill
      # of materials. Attached as a Release asset by create-release.
      - name: Generate SPDX SBOM for dists
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist/
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
      # Generate SLSA build provenance for each dist. The attestation is
      # pushed to GitHub's attestations API (verifiable via `gh attestation
      # verify`) and also written to disk so we can attach .intoto.jsonl
      # files to the GitHub Release — which is what OpenSSF Scorecard's
      # Signed-Releases provenance check looks for.
      - name: Generate SLSA build provenance
        id: provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - name: Stage provenance bundles per artifact
        # attest-build-provenance emits a single bundle covering all
        # subjects. Alias it per-artifact so the filename convention
        # (<artifact>.intoto.jsonl) matches Scorecard's pattern scan of
        # Release assets.
        run: |
          mkdir -p provenance
          shopt -s nullglob
          for d in dist/*.whl dist/*.tar.gz; do
            base="$(basename "$d")"
            cp "${{ steps.provenance.outputs.bundle-path }}" "provenance/${base}.intoto.jsonl"
          done
          ls provenance/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signatures
          path: signatures/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provenance
          path: provenance/

  testpypi:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/compose-lint
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  testpypi-smoke:
    needs: testpypi
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            requirements-build.lock
      - name: Install from TestPyPI and verify version
        # TestPyPI's JSON API sees a new release within seconds of the
        # publish step, but the /simple/ index pip uses can lag by
        # minutes. A fixed sleep has flaked mid-release before (0.3.6),
        # so retry the install with backoff until the index catches up
        # or we hit ~2 minutes of attempts.
        run: |
          version="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5 6; do
            if pip install \
                -i https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "compose-lint==${version}"; then
              break
            fi
            if [ "${attempt}" = 6 ]; then
              echo "::error::TestPyPI install failed after 6 attempts; index may still be propagating"
              exit 1
            fi
            echo "Attempt ${attempt} failed; sleeping 20s for /simple/ index propagation..."
            sleep 20
          done
          expected="compose-lint ${version}"
          actual="$(compose-lint --version)"
          echo "Expected: ${expected}"
          echo "Actual:   ${actual}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::TestPyPI version mismatch: installed '${actual}', expected '${expected}'"
            exit 1
          fi
      - name: Smoke test — lint a clean fixture
        run: compose-lint tests/smoke/clean.yml
      - name: Smoke test — insecure fixture exits 1
        run: |
          exit_code=0
          compose-lint tests/smoke/insecure.yml || exit_code=$?
          if [ "${exit_code}" -ne 1 ]; then
            echo "::error::Expected exit code 1, got ${exit_code}"
            exit 1
          fi

  # Build the image natively on each target arch and run the fixture battery.
  # Emulated arm64 via QEMU crashes on Debian apt-get, and a single-arch smoke
  # can't catch per-arch digest pins or native-wheel mismatches before the
  # release-gate — so both legs are exercised here, on their own runners, no
  # QEMU. Scout CVE scanning stays single-arch (amd64): CVE findings come from
  # base-image layers that are identical across arch in practice, and running
  # Scout twice would double-upload SARIF under the same category.
  docker-smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            scout: true
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            scout: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build image for testing
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: composelint/compose-lint:test
      - name: Test — version output matches tag
        run: |
          expected="compose-lint ${GITHUB_REF_NAME#v}"
          actual="$(docker run --rm composelint/compose-lint:test --version)"
          echo "Expected: ${expected}"
          echo "Actual:   ${actual}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Version mismatch: image reports '${actual}', expected '${expected}'"
            exit 1
          fi
      - name: Test — clean fixture exits 0
        run: |
          docker run --rm \
            -v "${PWD}/tests/smoke/clean.yml":/src/docker-compose.yml \
            composelint/compose-lint:test
      - name: Test — insecure fixture exits 1
        run: |
          exit_code=0
          docker run --rm \
            -v "${PWD}/tests/smoke/insecure.yml":/src/docker-compose.yml \
            composelint/compose-lint:test || exit_code=$?
          if [ "${exit_code}" -ne 1 ]; then
            echo "::error::Expected exit code 1, got ${exit_code}"
            exit 1
          fi
      - name: Test — SARIF output is valid JSON
        run: |
          docker run --rm \
            -v "${PWD}/tests/smoke/sarif-shape.yml":/src/docker-compose.yml \
            composelint/compose-lint:test --format sarif --fail-on critical \
            | python3 -c "import sys, json; json.load(sys.stdin); print('Valid SARIF JSON')"
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: matrix.scout
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Scan for vulnerabilities (Docker Scout)
        if: matrix.scout
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1.20.4
        with:
          command: cves
          image: local://composelint/compose-lint:test
          only-severities: critical
          exit-code: true
          sarif-file: scout-results.sarif
          # Honor the OpenVEX document for this release. Smoke scans the
          # locally-built image, which has no registry manifest for Scout
          # to discover cosign attestations on, so point at the file
          # directly. The pip CVEs (CVE-2025-8869, CVE-2026-1703,
          # CVE-2026-3219) against pip 25.1.1 are marked not_affected /
          # vulnerable_code_not_present — see
          # .vex/compose-lint.openvex.json and ADR-012.
          vex-location: .vex/compose-lint.openvex.json
          # Override Scout's default vex-author allowlist
          # (`<.*@docker.com>`) so our maintainer-authored statements
          # are not silently dropped. `.*` accepts any author and is
          # safe because the document is also cosign-attested to the
          # image manifest. See ADR-012.
          vex-author: .*
      - name: Upload Scout results to GitHub Security
        if: matrix.scout && always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: scout-results.sarif
          category: docker-scout

  # Single approval gate — all smoke tests (PyPI + Docker) must pass first.
  # Configure the 'release' GitHub Environment with required reviewers.
  release-gate:
    needs: [testpypi-smoke, docker-smoke]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment:
      name: release
    steps:
      - run: echo "All smoke tests passed. Proceeding with production publish."

  publish:
    needs: release-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/compose-lint
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  # Build one image per architecture on a native runner and push it to the
  # registry by digest only (no tags). Emulated arm64 via QEMU crashes on
  # Debian apt-get (exit 255 from the QEMU emulator itself), so each arch
  # builds on its own native runner. A subsequent job stitches the
  # per-arch digests into a multi-arch manifest list.
  docker-build:
    needs: release-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Derive artifact slug from platform
        id: slug
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=composelint/compose-lint,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-publish:
    needs: docker-build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    environment:
      name: dockerhub
      url: https://hub.docker.com/r/composelint/compose-lint
    steps:
      # Checkout provides .vex/compose-lint.openvex.json for the
      # OpenVEX attestation step further down. The digests land in
      # /tmp/digests (outside $GITHUB_WORKSPACE) so checkout and
      # download-artifact do not collide.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: composelint/compose-lint
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          tag_flags=()
          while IFS= read -r t; do
            tag_flags+=(-t "$t")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digest_refs=()
          for f in *; do
            digest_refs+=("composelint/compose-lint@sha256:${f}")
          done
          docker buildx imagetools create "${tag_flags[@]}" "${digest_refs[@]}"
      - name: Inspect manifest digest
        id: inspect
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          digest="$(docker buildx imagetools inspect \
            "composelint/compose-lint:${VERSION}" \
            --format '{{json .Manifest}}' | jq -r '.digest')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Sign manifest with cosign
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: cosign sign --yes "composelint/compose-lint@${DIGEST}"
      - name: Verify — cosign signature
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          for attempt in 1 2 3; do
            if cosign verify \
              --certificate-identity-regexp="github\.com/tmatens/compose-lint" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              "composelint/compose-lint@${DIGEST}"; then
              exit 0
            fi
            echo "Attempt ${attempt} failed, waiting 15s for signature propagation..."
            sleep 15
          done
          echo "::error::cosign verify failed after 3 attempts"
          exit 1
      - name: Verify — published image version matches tag
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          expected="compose-lint ${GITHUB_REF_NAME#v}"
          actual="$(docker run --rm "composelint/compose-lint@${DIGEST}" --version)"
          echo "Expected: ${expected}"
          echo "Actual:   ${actual}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Published image version mismatch: '${actual}' vs tag '${expected}'"
            exit 1
          fi
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: composelint/compose-lint@${{ steps.inspect.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Attest SBOM to image
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json \
            "composelint/compose-lint@${DIGEST}"
      - name: Attest OpenVEX to image
        # Attach the OpenVEX document as an in-toto attestation on the
        # image manifest. Scanners that consume cosign attestations (Scout,
        # Trivy with --vex + attestation discovery, recent Grype) will find
        # the VEX without needing a `--vex` URL passed on the CLI, and can
        # mark unreachable pip CVEs as not_affected automatically.
        # Predicate type `openvex` is a known cosign shortname mapped to
        # https://openvex.dev/ns/v0.2.0.
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
        run: |
          cosign attest --yes --type openvex \
            --predicate .vex/compose-lint.openvex.json \
            "composelint/compose-lint@${DIGEST}"

  # Sync the Docker Hub repository overview (long description shown on the
  # tags page) from this tag's README.md after a successful image push.
  # README.md uses absolute https://github.com/... links so it renders
  # correctly off-platform — Hub does not resolve relative paths.
  #
  # Uses a first-party composite action so no third-party Node bundle
  # ever holds the delete-capable Docker Hub PAT. Implementation lives in
  # `scripts/update-dockerhub-description.sh`; the action.yml just forwards
  # inputs.
  dockerhub-description:
    needs: docker-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: dockerhub
      url: https://hub.docker.com/r/composelint/compose-lint
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/update-dockerhub-description
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: composelint/compose-lint
          readme-filepath: ./README.md

  # Create the GitHub Release only after both production channels
  # (PyPI + Docker Hub) have published successfully. `needs:` gating
  # means a failure in either channel skips this job, so we never
  # advertise a half-published version. Release notes come from the
  # matching `## [X.Y.Z]` section in CHANGELOG.md. Creating the
  # Release also updates the Marketplace listing for the action.
  create-release:
    needs: [publish, docker-publish]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signatures
          path: signatures/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: .
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provenance
          path: provenance/
      - name: Extract changelog section for this tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          awk -v v="${version}" '
            $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::error::No CHANGELOG section found for ${version}"
            exit 1
          fi
      - name: Create GitHub Release
        # Attach wheels, sdist, Sigstore bundles, SBOM, SLSA build
        # provenance (.intoto.jsonl), and the OpenVEX document as release
        # assets. OpenSSF Scorecard's Signed-Releases check scans the last
        # 5 GitHub releases for accompanying signature files (`.sigstore`,
        # `.sig`, `.asc`, `.intoto.jsonl`) alongside distributions. The
        # VEX document (`.vex/compose-lint.openvex.json`) lets downstream
        # scanners apply `not_affected` justifications for CVEs whose
        # vulnerable code has been removed from the runtime image (see
        # Dockerfile post-install cleanup).
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file notes.md \
            --verify-tag \
            dist/*.whl dist/*.tar.gz signatures/* sbom.spdx.json provenance/* \
            .vex/compose-lint.openvex.json

  # Post-release canary: download the just-attached Sigstore bundles from
  # the GitHub Release and cryptographically verify each one against the
  # expected OIDC identity (this workflow at this tag) and issuer.
  #
  # The pre-publish check in `build` confirms a bundle file *exists* for
  # every dist; this closes the loop by confirming the bundle actually
  # *verifies*. Catches malformed bundles, identity drift, or a shipped
  # signature that can't be validated by downstream consumers.
  #
  # Runs after `create-release` so the Release page assets are available
  # to `gh release download`. Fails the workflow if any bundle fails to
  # verify, surfacing a red run on the tag.
  verify-release-signatures:
    needs: create-release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            requirements-build.lock
      - name: Install sigstore verifier (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.lock
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          gh release download "${TAG}" --dir release-assets
          ls release-assets/
      - name: Verify Sigstore bundles
        env:
          TAG: ${{ github.ref_name }}
        run: |
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/publish.yml@refs/tags/${TAG}"
          issuer="https://token.actions.githubusercontent.com"
          echo "Expected identity: ${identity}"
          echo "Expected issuer:   ${issuer}"
          shopt -s nullglob
          dists=(release-assets/*.whl release-assets/*.tar.gz)
          if [ "${#dists[@]}" -eq 0 ]; then
            echo "::error::No distributions found in release assets"
            exit 1
          fi
          failures=0
          for d in "${dists[@]}"; do
            base="$(basename "$d")"
            bundle=""
            for cand in "release-assets/${base}.sigstore" "release-assets/${base}.sigstore.json"; do
              if [ -f "${cand}" ]; then
                bundle="${cand}"
                break
              fi
            done
            if [ -z "${bundle}" ]; then
              echo "::error::No Sigstore bundle found alongside ${base}"
              failures=$((failures + 1))
              continue
            fi
            echo "Verifying ${base} against ${bundle}"
            if ! python -m sigstore verify identity \
                --cert-identity "${identity}" \
                --cert-oidc-issuer "${issuer}" \
                --bundle "${bundle}" \
                "${d}"; then
              echo "::error::Sigstore verify failed for ${base}"
              failures=$((failures + 1))
            fi
          done
          if [ "${failures}" -gt 0 ]; then
            echo "::error::${failures} signature(s) failed verification"
            exit 1
          fi
          echo "All ${#dists[@]} Sigstore bundles verified."

  # Post-tag, post-publish automation. At this point:
  #   - The signed tag ${{ github.ref_name }} exists (it triggered this
  #     workflow), so `git rev-parse <tag>^{commit}` resolves.
  #   - `publish` and `docker-publish` have both succeeded (gated via
  #     `needs: create-release`), so PyPI + Docker Hub show the new
  #     version and the GitHub Release page is live.
  # Only in that state does updating the Marketplace smoke test pin make
  # sense: the pinned SHA must point at an artifact that actually shipped.
  # This job opens a PR; a human still reviews and merges it, and then
  # triggers the Marketplace smoke workflow to verify end-to-end.
  bump-marketplace-smoke-pin:
    name: Bump marketplace-smoke pin (post-tag, post-publish)
    needs: create-release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Fail fast with a clear message if the PAT isn't configured.
      # GITHUB_TOKEN cannot push commits that modify .github/workflows/*
      # (that scope is deliberately withheld to prevent an action from
      # self-modifying its own triggers), so this job needs a PAT with
      # the `workflow` scope. Without the secret, the checkout below
      # would still succeed but `git push` would fail halfway through
      # the job — catch it here instead.
      - name: Preflight — MARKETPLACE_SMOKE_PAT must be configured
        env:
          PAT: ${{ secrets.MARKETPLACE_SMOKE_PAT }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::MARKETPLACE_SMOKE_PAT secret is not configured. See docs/CI.md > bump-marketplace-smoke-pin for PAT scopes."
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
          # Use a PAT so `git push` can include workflow-file changes.
          token: ${{ secrets.MARKETPLACE_SMOKE_PAT }}
      - name: Resolve release SHA from tag
        id: sha
        env:
          TAG: ${{ github.ref_name }}
        run: |
          sha=$(git rev-parse "${TAG}^{commit}")
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          {
            echo "### Post-tag marketplace-smoke pin bump"
            echo ""
            echo "Tag: \`${TAG}\`"
            echo "Commit: \`${sha}\`"
            echo ""
            echo "This runs **after** publish + docker-publish + create-release all"
            echo "succeeded, so the pinned SHA points at a release that actually"
            echo "shipped to PyPI, Docker Hub, and GitHub Releases."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Update .github/workflows/marketplace-smoke.yml
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          version="${TAG#v}"
          sed -i -E \
            "s|uses: tmatens/compose-lint@[0-9a-f]+ # v[0-9.]+|uses: tmatens/compose-lint@${SHA} # v${version}|g" \
            .github/workflows/marketplace-smoke.yml
          if git diff --quiet .github/workflows/marketplace-smoke.yml; then
            echo "no_changes=1" >> "$GITHUB_ENV"
            echo "::notice::marketplace-smoke.yml already points at ${SHA}; nothing to do."
          else
            echo "marketplace-smoke.yml updated to ${SHA} (${TAG})."
          fi
      - name: Commit, push, open PR
        if: env.no_changes != '1'
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${TAG#v}"
          branch="chore/marketplace-smoke-${version}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add .github/workflows/marketplace-smoke.yml
          git commit -m "Bump marketplace-smoke pin to ${TAG}"
          git push -u origin "${branch}"
          cat > /tmp/pr-body.md <<EOF
          **Post-tag follow-up.** This PR was opened automatically by \`publish.yml\` *after*:

          - Tag \`${TAG}\` was pushed and triggered the Publish workflow
          - TestPyPI + Docker smoke tests passed
          - The \`release-gate\` environment was approved
          - \`publish\` (PyPI) and \`docker-publish\` (Docker Hub) both succeeded
          - \`create-release\` created the GitHub Release \`${TAG}\`

          So the pinned SHA \`${SHA}\` is guaranteed to correspond to a release that actually shipped through every channel.

          **After merging this PR**, trigger **Actions → Marketplace smoke test → Run workflow** to verify the published Action end-to-end against the new tag.
          EOF
          # Strip the 10-space indentation that the YAML block scalar requires.
          sed -i -E 's/^          //' /tmp/pr-body.md
          gh pr create \
            --base main \
            --head "${branch}" \
            --title "Bump marketplace-smoke pin to ${TAG}" \
            --body-file /tmp/pr-body.md
