name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

# Default to read-only — individual jobs request what they need.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install build==1.4.3
      - run: python -m build
      - name: Verify dist contents
        run: |
          pip install twine==6.2.0
          twine check dist/*
          # Wheel must NOT contain agent config, .env, tests, or .git.
          if unzip -l dist/*.whl | grep -E '(AGENTS\.md|CLAUDE\.md|\.env|/tests/|\.git/)'; then
            echo "::error::Wheel contains forbidden files"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate real PyPI on a successful TestPyPI publish — a TestPyPI failure
    # almost always means real PyPI would fail too, so we fail fast before
    # burning a version number on the real index.
    environment:
      name: testpypi
      url: https://test.pypi.org/p/compose-lint
    permissions:
      # OIDC token for TestPyPI Trusted Publishing.
      id-token: write
      # Write Sigstore build attestations to the workflow run.
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  publish:
    needs: testpypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/compose-lint
    permissions:
      # OIDC token for PyPI Trusted Publishing.
      id-token: write
      # Write Sigstore build attestations to the workflow run.
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
