name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

# Default to read-only — individual jobs request what they need.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install pinned build env
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-deps -e .
      - run: python -m build
      - name: Verify dist contents
        run: |
          twine check dist/*
          # Wheel must NOT contain agent config, .env, tests, or .git.
          if unzip -l dist/*.whl | grep -E '(AGENTS\.md|CLAUDE\.md|\.env|/tests/|\.git/)'; then
            echo "::error::Wheel contains forbidden files"
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate real PyPI on a successful TestPyPI publish — a TestPyPI failure
    # almost always means real PyPI would fail too, so we fail fast before
    # burning a version number on the real index.
    environment:
      name: testpypi
      url: https://test.pypi.org/p/compose-lint
    permissions:
      # OIDC token for TestPyPI Trusted Publishing.
      id-token: write
      # Write Sigstore build attestations to the workflow run.
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  publish:
    needs: testpypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/compose-lint
    permissions:
      # OIDC token for PyPI Trusted Publishing.
      id-token: write
      # Write Sigstore build attestations to the workflow run.
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
