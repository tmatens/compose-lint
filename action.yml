name: "compose-lint"
description: "Security-focused linter for Docker Compose files"
branding:
  icon: "shield"
  color: "blue"

inputs:
  files:
    description: "Space-separated list of Compose files to lint"
    required: false
    default: ""
  pattern:
    description: "Glob pattern to find Compose files (e.g., '**/docker-compose*.yml')"
    required: false
    default: ""
  fail-on:
    description: "Minimum severity to trigger failure (low, medium, high, critical)"
    required: false
    default: "high"
  config:
    description: "Path to .compose-lint.yml config file"
    required: false
    default: ""
  skip-suppressed:
    description: "Hide suppressed findings from output"
    required: false
    default: "false"
  quiet:
    description: "Text output: one line per finding (no fix block or excerpt)"
    required: false
    default: "false"
  verbose:
    description: "Text output: repeat the fix block and reference on every finding"
    required: false
    default: "false"
  sarif-file:
    description: "Path to write SARIF output (enables GitHub Code Scanning upload)"
    required: false
    default: ""
  version:
    description: "compose-lint version to install (default: latest)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # User-controlled inputs are passed via the `env:` block rather than
    # interpolated directly into the `run:` script. Direct ${{ }} expansion
    # in shell bodies is a script-injection sink — see
    # https://securitylab.github.com/research/github-actions-untrusted-input/
    - name: Install compose-lint
      shell: bash
      env:
        CL_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$CL_VERSION" ]; then
          pip install "compose-lint==${CL_VERSION}"
        else
          pip install compose-lint
        fi

    - name: Find Compose files
      id: find-files
      shell: bash
      env:
        CL_FILES: ${{ inputs.files }}
        CL_PATTERN: ${{ inputs.pattern }}
      run: |
        FILES="$CL_FILES"
        if [ -z "$FILES" ] && [ -n "$CL_PATTERN" ]; then
          # -name takes a literal glob; we never eval the pattern as shell.
          FILES=$(find . -path "./.git" -prune -o -name "$CL_PATTERN" -print | tr '\n' ' ')
        fi
        if [ -z "$FILES" ]; then
          # Default: common Compose file names in repo root
          for f in docker-compose.yml docker-compose.yaml compose.yml compose.yaml; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
        fi
        if [ -z "$FILES" ]; then
          echo "::warning::No Compose files found"
          echo "files=" >> "$GITHUB_OUTPUT"
        else
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
        fi

    - name: Run compose-lint
      if: steps.find-files.outputs.files != ''
      shell: bash
      env:
        CL_CONFIG: ${{ inputs.config }}
        CL_FAIL_ON: ${{ inputs.fail-on }}
        CL_SKIP_SUPPRESSED: ${{ inputs.skip-suppressed }}
        CL_QUIET: ${{ inputs.quiet }}
        CL_VERBOSE: ${{ inputs.verbose }}
        CL_SARIF_FILE: ${{ inputs.sarif-file }}
        CL_TARGET_FILES: ${{ steps.find-files.outputs.files }}
      run: |
        ARGS=()
        if [ -n "$CL_CONFIG" ]; then
          ARGS+=(--config "$CL_CONFIG")
        fi
        ARGS+=(--fail-on "$CL_FAIL_ON")
        if [ "$CL_SKIP_SUPPRESSED" = "true" ]; then
          ARGS+=(--skip-suppressed)
        fi
        if [ "$CL_QUIET" = "true" ]; then
          ARGS+=(--quiet)
        fi
        if [ "$CL_VERBOSE" = "true" ]; then
          ARGS+=(--verbose)
        fi

        # Word-split the file list intentionally — it is space-separated
        # by `Find Compose files` above.
        # shellcheck disable=SC2086
        compose-lint "${ARGS[@]}" $CL_TARGET_FILES || TEXT_EXIT=$?

        # When a SARIF artifact is requested, re-run in SARIF mode. The first
        # run prints human-readable output to the job log and sets the exit
        # code; this run only writes the file. Rules are deterministic, so the
        # two runs report the same findings.
        if [ -n "$CL_SARIF_FILE" ]; then
          # shellcheck disable=SC2086
          compose-lint --format sarif "${ARGS[@]}" $CL_TARGET_FILES \
            > "$CL_SARIF_FILE" || true
        fi

        exit ${TEXT_EXIT:-0}

    - name: Upload SARIF
      if: inputs.sarif-file != '' && always() && steps.find-files.outputs.files != ''
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      with:
        sarif_file: ${{ inputs.sarif-file }}
