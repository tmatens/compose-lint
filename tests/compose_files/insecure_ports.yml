services:
  unbound_short:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
      - "443:443"
  bound_short:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
  unbound_long:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 8080
  bound_long:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 8080
        host_ip: "127.0.0.1"
  container_only:
    image: nginx:1.27-alpine
    ports:
      - "80"
  port_range:
    image: nginx:1.27-alpine
    ports:
      - "8000-8100:8000-8100"
  no_ports:
    image: nginx:1.27-alpine
  ipv6_wildcard_short:
    image: nginx:1.27-alpine
    ports:
      - "[::]:8080:80"
  ipv6_loopback_short:
    image: nginx:1.27-alpine
    ports:
      - "[::1]:8080:80"
  ipv4_wildcard_short:
    image: nginx:1.27-alpine
    ports:
      - "0.0.0.0:8080:80"
  long_ipv6_wildcard:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 8080
        host_ip: "::"
  long_ipv4_wildcard:
    image: nginx:1.27-alpine
    ports:
      - target: 443
        published: 8443
        host_ip: "0.0.0.0"
  long_ipv6_loopback:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 8080
        host_ip: "::1"
