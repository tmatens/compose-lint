services:
  seccomp_unconfined:
    image: nginx:1.27-alpine
    security_opt:
      - seccomp:unconfined
  apparmor_unconfined:
    image: nginx:1.27-alpine
    security_opt:
      - apparmor:unconfined
  both_unconfined:
    image: nginx:1.27-alpine
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
  custom_seccomp:
    image: nginx:1.27-alpine
    security_opt:
      - seccomp:custom-profile.json
  no_new_privs_only:
    image: nginx:1.27-alpine
    security_opt:
      - no-new-privileges:true
  no_security_opt:
    image: nginx:1.27-alpine
