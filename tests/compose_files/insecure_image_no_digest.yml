services:
  version_tag:
    image: nginx:1.25.3
  alpine_tag:
    image: nginx:1.27-alpine
  registry_tag:
    image: ghcr.io/org/app:2.0.1
  digest_pinned:
    image: nginx:1.25.3@sha256:abcdef1234567890
  no_tag:
    image: nginx
  latest_tag:
    image: nginx:latest
  stable_tag:
    image: nginx:stable
  build_only:
    build: .
  port_registry_pinned:
    image: localhost:5000/foo:v1.2.3
  port_registry_no_tag:
    image: localhost:5000/foo
  port_registry_digest:
    image: localhost:5000/foo:v1.2.3@sha256:abcdef
