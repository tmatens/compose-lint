services:
  literal_postgres_password:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: hunter2
  literal_password_decoy_value:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: changeme
  literal_token_map:
    image: app:1.0
    environment:
      GITHUB_TOKEN: ghp_abcdefghijklmnopqrstuvwxyz0123456789
  literal_secret_map:
    image: app:1.0
    environment:
      JWT_SECRET: notreallyasecret
  literal_api_key:
    image: app:1.0
    environment:
      OPENAI_API_KEY: sk-proj-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  literal_apikey_no_underscore:
    image: app:1.0
    environment:
      MYAPIKEY: literalvalue
  literal_access_key:
    image: app:1.0
    environment:
      AWS_ACCESS_KEY: AKIAIOSFODNN7EXAMPLE
  literal_secret_key:
    image: app:1.0
    environment:
      AWS_SECRET_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
  literal_credential:
    image: app:1.0
    environment:
      MY_CREDENTIAL: somevalue
  literal_private_key:
    image: app:1.0
    environment:
      SSH_PRIVATE_KEY: notarealkey
  literal_pass_suffix:
    image: app:1.0
    environment:
      DB_PASS: dbpasswordliteral
  literal_pwd_suffix:
    image: app:1.0
    environment:
      POSTGRES_PWD: pwdliteral
  literal_passwd:
    image: app:1.0
    environment:
      MYSQL_PASSWD: passwdliteral
  literal_salt:
    image: app:1.0
    environment:
      SESSION_SALT: somesalt
  literal_dsn:
    image: app:1.0
    environment:
      SENTRY_DSN: https://abc@sentry.io/123
  list_form_password:
    image: app:1.0
    environment:
      - POSTGRES_PASSWORD=listform_literal
  list_form_token_inline:
    image: app:1.0
    environment:
      - API_TOKEN=anothertoken
  multiple_findings_one_service:
    image: app:1.0
    environment:
      DB_PASSWORD: a
      JWT_SECRET: b
      API_TOKEN: c
  exempt_password_file:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
  exempt_allow_empty_password:
    image: mysql:8
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
  exempt_random_root_password:
    image: mysql:8
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
  exempt_boolean_value_true:
    image: app:1.0
    environment:
      USE_PASSWORD_AUTH: "true"
  exempt_boolean_value_one:
    image: app:1.0
    environment:
      ENABLE_TOKEN: "1"
  skip_pure_var_ref:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  skip_pure_var_default:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fallback}
  skip_short_var:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
  skip_mixed_var_reference:
    image: app:1.0
    environment:
      API_TOKEN: prefix-${TOKEN}
  skip_empty_string:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ""
  skip_unrelated_key:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_DB: app
  skip_bare_list_key:
    image: app:1.0
    environment:
      - POSTGRES_PASSWORD
  skip_no_environment:
    image: app:1.0
  skip_passport_substring_false_positive:
    image: app:1.0
    environment:
      EGG_PASSPORT_GITHUB_CLIENT_ID: literalclientid
  skip_yaml_bool_value:
    image: app:1.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: true
